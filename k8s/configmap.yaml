apiVersion: v1
kind: ConfigMap
metadata:
  name: statex-ecosystem-config
  namespace: statex-apps
  labels:
    app: statex-ecosystem
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "statex-ecosystem"
  DOMAIN: "statex-ecosystem.alfares.cz"
  PORT: "4710"
  # Add environment variables from .env that are non-sensitive (no secrets, API keys, passwords)
  # Examples:
  # DATABASE_POOL_SIZE: "10"
  # LOG_LEVEL: "info"
  DB_HOST: "db-server-postgres"
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: "statex"
  DB_SYNC: "false"
  DB_AUTO_CREATE: "true"
  # TIMEOUT_MS: "30000"
