# Local smoke test without nginx-network (optional). Production: docker-compose.blue.yml / .green.yml + scripts/deploy.sh.
services:
  statex-ecosystem:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: statex-ecosystem-local
    ports:
      - "${PORT:-4710}:${CONTAINER_PORT:-3000}"
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
