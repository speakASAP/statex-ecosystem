apiVersion: apps/v1
kind: Deployment
metadata:
  name: statex-ecosystem
  namespace: statex-apps
  labels:
    app: statex-ecosystem
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statex-ecosystem
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: statex-ecosystem
    spec:
      containers:
        - name: app
          image: localhost:5000/statex-ecosystem:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4710
          envFrom:
            - configMapRef:
                name: statex-ecosystem-config
            - secretRef:
                name: statex-ecosystem-secret
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4710
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4710
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
