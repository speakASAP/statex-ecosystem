# Intentionally no path lines. Same pattern as rehtani: registering "/" with path-based
# api_routes can make nginx-microservice emit proxy_pass http://$TARGET_UPSTREAM/;
# which breaks Next.js static assets (_next/static). With routes absent/empty, the
# generator proxies full request URIs to the upstream.
#
# Health for probes: /api/health (handled by Next route).
