services:
  statex-ecosystem:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: statex-ecosystem-blue
    ports:
      - "${PORT:-4710}:${CONTAINER_PORT:-3000}"
    environment:
      NODE_ENV: production
    networks:
      - nginx-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  nginx-network:
    external: true
    name: ${NGINX_NETWORK_NAME:-nginx-network}
